name: ci

on:
  push:
  pull_request:

jobs:
  windows-quality:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest==9.0.1 ruff==0.15.1

      - name: Lint
        run: python -m ruff check src

      - name: Tests
        run: python -m pytest -q

      - name: Build check
        run: python -m compileall -q src

      - name: CLI smoke
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m agentforge.cli --help

      - name: Launcher smoke
        shell: cmd
        run: |
          set EXTRA_ARGS=--help
          call run.bat
