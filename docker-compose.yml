version: "3.9"

services:
  agent02:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent02
    command: ["start", "--data-dir", "/app/data"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - AGENT02_MASTER_KEY=${AGENT02_MASTER_KEY:-}
    restart: unless-stopped

  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: agent02-llamacpp
    command: ["-m", "/models/model.gguf", "--host", "0.0.0.0", "--port", "8081"]
    ports:
      - "8081:8081"
    volumes:
      - ./models:/models:ro
    restart: unless-stopped
    profiles:
      - local-gguf